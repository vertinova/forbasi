server {
    listen 80;
    server_name forbasi.or.id www.forbasi.or.id;

    root /var/www/forbasi-pb-frontend/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5025/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        client_max_body_size 10M;
    }

    location ^~ /uploads/ {
        proxy_pass http://127.0.0.1:5025/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Cache-Control "public, max-age=86400, must-revalidate";
    }

    location = /webhook {
        proxy_pass http://127.0.0.1:9001/webhook;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10s;
        client_max_body_size 1M;
    }

    location = /webhook/ping {
        proxy_pass http://127.0.0.1:9001/webhook/ping;
        proxy_set_header Host $host;
    }

    location = /version.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
